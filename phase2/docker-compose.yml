services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    ports:
      # Port accessible sur Windows : http://localhost:3000
      - "3000:8080"
    environment:
      # Connexion vers LM Studio sur Windows (host.docker.internal = localhost de Windows)
      - OPENAI_API_BASE_URL=http://host.docker.internal:1234/v1
      - OPENAI_API_KEY=lm-studio
      # Clé secrète pour les sessions — générer une valeur aléatoire dans .env
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}
      # Désactiver la télémétrie
      - SCARF_NO_ANALYTICS=true
      - DO_NOT_TRACK=true
      - ANONYMIZED_TELEMETRY=false
    volumes:
      # Données persistantes : comptes, historique, configuration
      - open-webui-data:/app/backend/data
    extra_hosts:
      # Résolution DNS pour atteindre localhost de Windows depuis Docker
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    # Healthcheck pour savoir quand le service est prêt
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  open-webui-data:
    name: open-webui-data
