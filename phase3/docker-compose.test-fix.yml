version: '3.8'

services:
  openhands:
    image: ghcr.io/all-hands-ai/openhands:latest
    container_name: openhands-test-noruntime
    ports:
      - "3005:3000"
    environment:
      - LLM_BASE_URL=http://host.docker.internal:1234/v1
      - LLM_API_KEY=lm-studio
      - LLM_MODEL=qwen2.5-coder-14b-instruct
      # REMOVE: SANDBOX_RUNTIME_CONTAINER_IMAGE=ghcr.io/all-hands-ai/runtime:latest
      # KEEP: base_container_image default
      - SANDBOX_USER_ID=1000
      - WORKSPACE_BASE=/opt/workspace
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./test-openhands-data:/.openhands
      - ./test-openhands-workspace:/opt/workspace
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
