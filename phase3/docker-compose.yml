services:
  openhands:
    image: docker.all-hands.dev/all-hands-ai/openhands:latest
    container_name: openhands
    ports:
      # Port 3001 pour éviter le conflit avec Open WebUI sur 3000
      - "3001:3000"
    environment:
      # Connexion LM Studio depuis Docker
      - LLM_BASE_URL=http://host.docker.internal:1234/v1
      - LLM_API_KEY=${OPENAI_API_KEY}
      - LLM_MODEL=${LLM_MODEL}
      # Sandbox Docker-in-Docker
      - SANDBOX_RUNTIME_CONTAINER_IMAGE=docker.all-hands.dev/all-hands-ai/runtime:latest
      - SANDBOX_USER_ID=1000
      # Répertoire de travail persistant
      - WORKSPACE_BASE=/opt/workspace
    volumes:
      # Accès au daemon Docker pour le sandbox
      - /var/run/docker.sock:/var/run/docker.sock
      # Workspace persistant (optionnel : monter votre repo projet)
      - openhands-workspace:/opt/workspace
    extra_hosts:
      # Résolution DNS pour atteindre localhost de Windows depuis Docker
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  openhands-workspace:
    name: openhands-workspace
